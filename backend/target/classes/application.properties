
server.port=8080




#  date base information
spring.datasource.url=${MY_DB_URL}
spring.datasource.username=${MY_DB_USER}
spring.datasource.password=${MY_DB_PASSWORD}


# Apify
apify.token=${MY_APIFY_TOKEN}


jwt.secret=${MY_SECRET_KEY}
jwt.expiration=${MY_EXPIRATION_TIME}


# settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true



#MAIL CONFIG

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# driver
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.profiles.active=default

springdoc.packages-to-scan=jobfinder.controller
#
server.forward-headers-strategy=framework

spring.graphql.graphiql.enabled=true
spring.graphql.schema.printer.enabled=true