
server.port=8080




#  date base information
spring.datasource.url=${MY_DB_URL}
spring.datasource.username=${MY_DB_USER}
spring.datasource.password=${MY_DB_PASSWORD}


# Apify
apify.token=${MY_APIFY_TOKEN}


jwt.secret=${MY_SECRET_KEY}
jwt.expiration=${MY_EXPIRATION_TIME}



# settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true





# driver
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.profiles.active=default


springdoc.packages-to-scan=jobfinder.controller
#
server.forward-headers-strategy=framework